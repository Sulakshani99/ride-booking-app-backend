spring.application.name=ride-auth

server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ride_auth_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sula@991215}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:cmlkZS1ib29raW5nLWF1dGgtc2VjcmV0LWZvci1sb2NhbC1kZXYtMTIzNDU2Nzg5MA==}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:1000*60*15}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:1000*60*60*24}

# Default Admin Account
app.admin.full-name=${APP_ADMIN_FULL_NAME:Ride Booking Admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@ridebooking.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin@12345}
app.admin.phone-number=${APP_ADMIN_PHONE_NUMBER:0999999999}

# Logging
logging.level.com.ridebooking.auth=DEBUG
