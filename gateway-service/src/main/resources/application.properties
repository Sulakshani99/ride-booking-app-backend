spring.application.name=ride-gateway

server.port=8080

# Gateway routing (simple placeholder URLs)
auth.service.url=http://localhost:8081
ride.service.url=http://localhost:8082
payment.service.url=http://localhost:8083
notification.service.url=http://localhost:8084

spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=${auth.service.url}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/auth/**

# Logging
logging.level.com.ridebooking.gateway=DEBUG
