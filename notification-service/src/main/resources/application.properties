spring.application.name=ride-notification

server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ride_notification_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sula@991215}
